---
- project:
    vars:
      ensure_tox_version: '<4'
    check:
      jobs:
        - openstack-tox-linters
        - k8sapp-oidc-tox-py39
        - k8sapp-oidc-tox-flake8
        - k8sapp-oidc-tox-pylint
        - k8sapp-oidc-tox-metadata
        - k8sapp-oidc-tox-bandit
    gate:
      jobs:
        - openstack-tox-linters
        - k8sapp-oidc-tox-py39
        - k8sapp-oidc-tox-flake8
        - k8sapp-oidc-tox-pylint
        - k8sapp-oidc-tox-metadata
        - k8sapp-oidc-tox-bandit
    post:
      jobs:
        - stx-oidc-auth-armada-app-upload-git-mirror

- job:
    name: k8sapp-oidc-tox-py39
    parent: openstack-tox-py39
    description: |
      Run py39 test for k8sapp_oidc
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-oidc/*
    vars:
      tox_extra_args: -c python3-k8sapp-oidc/k8sapp_oidc/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'


- job:
    name: k8sapp-oidc-tox-flake8
    parent: tox
    description: |
      Run flake8 test for k8sapp_oidc
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-oidc/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c python3-k8sapp-oidc/k8sapp_oidc/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-oidc-tox-metadata
    parent: tox
    description: |
      Run metadata test for k8sapp_oidc
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    vars:
      tox_envlist: metadata
      tox_extra_args: -c python3-k8sapp-oidc/k8sapp_oidc/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-oidc-tox-pylint
    parent: tox
    description: |
      Run pylint test for k8sapp_oidc
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-oidc/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c python3-k8sapp-oidc/k8sapp_oidc/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-oidc-tox-bandit
    parent: tox
    description: |
      Run bandit test for k8sapp_oidc
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-oidc/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c python3-k8sapp-oidc/k8sapp_oidc/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: stx-oidc-auth-armada-app-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/oidc-auth-armada-app to
      github.com/starlingx/oidc-auth-armada-app
    vars:
      git_mirror_repository: starlingx/oidc-auth-armada-app
    secrets:
      - name: git_mirror_credentials
        secret: stx-oidc-auth-armada-app-github-secret3
        pass-to-parent: true

