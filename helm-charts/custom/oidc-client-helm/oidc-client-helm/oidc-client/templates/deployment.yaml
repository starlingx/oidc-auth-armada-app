apiVersion: apps/v1
kind: Deployment
metadata:
  name: stx-oidc-client
  labels:
    app: stx-oidc-client
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: stx-oidc-client
  template:
    metadata:
      labels:
        app: stx-oidc-client
      annotations: {
        configchecksum: {{ toYaml .Values.config | sha256sum | trunc 63 }}
        }
    spec:
      imagePullSecrets:
        - name: default-registry-key
      initContainers:
        - name: wait-for-dex-port-to-be-ready
          image: {{ .Values.waitForOidcIssuer.image }}
          command:
            - sh
            - -c
            - |
              # Strip scheme
              HOSTPORT=$(echo "$OIDC_ISSUER" | cut -d'/' -f3)
              # IPv6: [host]:port
              if echo "$HOSTPORT" | grep -q '\['; then
                HOST=$(echo "$HOSTPORT" | cut -d']' -f1 | cut -d'[' -f2)
                PORT=$(echo "$HOSTPORT" | cut -d']' -f2 | cut -d':' -f2)
              else
                HOST=$(echo "$HOSTPORT" | cut -d':' -f1)
                PORT=$(echo "$HOSTPORT" | cut -d':' -f2)
              fi
              for i in $(seq 1 300); do
                nc -z -w5 $HOST $PORT && exit 0
                sleep 2
              done
              exit 1
          env:
            - name: OIDC_ISSUER
              value: "{{ .Values.config.issuer }}"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["./stx-oidc-client"]
          args: ["--config", "/etc/dex/cfg/config.yaml", "--debug"]
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpPath }}
              port: 5555
              scheme: HTTPS
{{- if eq false $.Values.helmv3Compatible }}
              initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
              periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
              timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
              failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
{{- else }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
{{- end }}

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpPath }}
              port: 5555
              scheme: HTTPS
{{- if eq false $.Values.helmv3Compatible }}
              initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
              periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
              timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
              failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
{{- else }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
{{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: "/home"
              name: dex-client-secret-volume
            - mountPath: /etc/dex/tls/https/server
              name: https-tls
            - name: config
              mountPath: /etc/dex/cfg
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      volumes:
        - name: dex-client-secret-volume
          secret:
            secretName: {{ .Values.config.issuer_root_ca_secret }}
        - name: https-tls
          secret:
            secretName: {{ .Values.tlsName }}
        - name: config
          configMap:
            name: stx-oidc-client
